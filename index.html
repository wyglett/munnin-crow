<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply appearance preferences before React mounts (prevents flash)
      try {
        var prefs = JSON.parse(localStorage.getItem('munnin_appearance') || '{}');
        if (prefs.tema) document.documentElement.setAttribute('data-tema', prefs.tema);
        if (prefs.layout) document.documentElement.setAttribute('data-layout', prefs.layout);
      } catch(e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>Munnin Crow - Plataforma de Consultoria e Gestão de Editais</title>
    <meta name="description" content="Plataforma completa para consultores e empreendedores gerenciarem projetos, propostas e acompanhamento de editais. Encontre oportunidades de financiamento com IA.">
    <meta name="keywords" content="edital, consultoria, financiamento, empreendedorismo, FAPES, pesquisa, inovação">
    <meta name="author" content="Munnin Crow">
    <meta property="og:title" content="Munnin Crow - Plataforma de Consultoria">
    <meta property="og:description" content="Transformando projetos em realidade através de consultoria especializada e gestão inteligente de editais.">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">
    <meta name="language" content="pt-BR">
